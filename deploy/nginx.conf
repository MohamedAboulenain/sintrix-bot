# Sintrix KNX Bot — Nginx reverse-proxy config
# Place this file at: /etc/nginx/sites-available/sintrix-knx
# Then: ln -s /etc/nginx/sites-available/sintrix-knx /etc/nginx/sites-enabled/
#
# Prerequisites:
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d app.sintrix.io

server {
    listen 80;
    server_name app.sintrix.io;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.sintrix.io;

    # SSL certs managed by certbot
    ssl_certificate     /etc/letsencrypt/live/app.sintrix.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sintrix.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy "strict-origin"     always;

    # Large uploads (default 1m is too small for PDF/Excel)
    client_max_body_size 25M;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # SSE — disable buffering so tokens stream to the browser immediately
    location /api/v1/chat {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 180s;
    }

    # All other API routes + frontend
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
