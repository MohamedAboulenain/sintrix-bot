# Sintrix KNX Bot — Nginx reverse-proxy config
# Place this file at: /etc/nginx/sites-available/sintrix-knx
# Then: ln -s /etc/nginx/sites-available/sintrix-knx /etc/nginx/sites-enabled/
#
# Prerequisites:
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d sintrix.io -d www.sintrix.io

# HTTP — redirect everything to https://sintrix.io (non-www canonical)
server {
    listen 80;
    server_name sintrix.io www.sintrix.io;
    return 301 https://sintrix.io$request_uri;
}

# HTTPS www — redirect to non-www canonical
server {
    listen 443 ssl http2;
    server_name www.sintrix.io;

    ssl_certificate     /etc/letsencrypt/live/sintrix.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sintrix.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://sintrix.io$request_uri;
}

# HTTPS canonical — main app server
server {
    listen 443 ssl http2;
    server_name sintrix.io;

    # SSL certs managed by certbot
    ssl_certificate     /etc/letsencrypt/live/sintrix.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sintrix.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header Referrer-Policy "strict-origin"                       always;
    add_header X-XSS-Protection "1; mode=block"                      always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data: blob:; font-src 'self';" always;

    # Large uploads (default 1m is too small for PDF/Excel)
    client_max_body_size 25M;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # SSE — disable buffering so tokens stream to the browser immediately
    location /api/v1/chat {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 180s;
    }

    # All other API routes + frontend
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
