services:
  app:
    build: .
    container_name: sintrix-knx-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Persist session files and user uploads across container restarts
      - ./data:/app/data
      # Mount NotebookLM Google auth token (created by `notebooklm login` on the host)
      - ~/.notebooklm:/root/.notebooklm:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
